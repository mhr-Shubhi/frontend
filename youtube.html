<!DOCTYPE html>
<html>
    <head>
        <title>YouTube.com Clone</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> 
        
        
        <style>
            p{
                font-family:  Roboto, Arial;
                margin-top: 0;
                margin-bottom: 0;
            } 
            .thumbnail{
                width: 300px;
                display: block;
            }
            .search-bar{
                font-size: 20px;
                display:block;
            }
            .video-preview{
                width: 300px;
                display: inline-block;
                vertical-align: top;
                margin-right: 15px;
            }
            .profile-pic{
                display: inline-block;
                width: 50px;
                vertical-align: top;
            }
           
            .creator-pfp{
                width: 36px;
                border-radius: 20px;
            }
            .video-info{
                display: inline-block; 
                width: 200px;
            }
            .video-title{
                font-weight: 550;
                font-size: 14px;
                line-height: 20px;
                margin-bottom: 10px;
            }

            .vid_author,.vid_info{
                color: rgb(96,96,96);
                font-size: 12px;
            }
            .vid_author{
                margin-bottom: 5px;
            }
            .thumbnail-spacing{
                margin-bottom: 12px;
            }

        </style>
    </head>
    <body>
        <input class="search-bar" type="search-bar" placeholder="Search">
    
    
    <div class="video-preview">
        <div class="thumbnail-spacing">
            <img class="thumbnail" src="thumbnails/thumbnail-1.webp" >
        </div> 
        
        <div>
        <div class="profile-pic">
            <img class="creator-pfp" src="channel_pfp/channel-1.jpeg"> 
        </div>
        <div class="video-info">
            <p class="video-title">
            Talking Tech and AI with Google CEO Sundar Pichai!
        </p>
        <p class="vid_author">
            Marques Brownlee
        </p>

        <p class="vid_info">
            3.4M views · 6 months ago
        </p>
        </div>
        </div>
        
    </div> 
        
    <div class="video-preview">
        <div class="thumbnail-spacing">
            <img class="thumbnail" src="thumbnails/thumbnail-2.webp" >
        </div>
        
        <div>
        <div class="profile-pic">
            <img class="creator-pfp" src="channel_pfp/channel-2.jpeg">
        </div>
        
        <div class="video-info">
        
        <p class="video-title">     
            
            Try Not To Laugh Challenge #9
        </p>
        <p class="vid_author">
            Markiplier
        </p>
        <p class="vid_info">
            19M views · 4 years ago
        </p>
        </div>
        </div>
       </div>  
    </body>
</html>
