            .thumbnail{
                width: 300px;

            }
            .search-bar{
                font-size: 20px;
                display:block;
            }
            .video-preview{
                width: 300px;
                display: inline-block;
                vertical-align: top;
            }
            
        </style>
    </head>
    <body>
        <input type="search-bar" placeholder="Search">

            Marques Brownlee
        </p>

        <p>
            3.4M views · 6 months ago
        </p>
       </div> 
        
       <div class="video-preview">
        <img class="thumbnail" src="thumbnails/thumbnail-2.webp" >
        <p>     
            
            Try Not To Laugh Challenge #9
        </p>

            Markiplier

        </p>

</html>
